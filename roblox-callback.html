<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing in — Zenith</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh;
        display: grid; place-items: center;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(180deg, #ffffff 0%, #e8e8e8 40%, #111111 100%);
        color: #111;
      }
      .card {
        max-width: 440px; width: 90%;
        text-align: center;
        background: rgba(255,255,255,0.94);
        border-radius: 28px;
        padding: 40px 32px;
        box-shadow: 0 32px 90px rgba(0,0,0,0.14);
      }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid #e5e5e5;
        border-top-color: #111;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 24px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { margin: 0 0 12px; font-size: 1.5rem; }
      p  { margin: 0; color: #6b7280; line-height: 1.7; font-size: 0.95rem; }
      .error-msg { color: #dc2626; font-weight: 600; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" id="spinner"></div>
      <h1 id="title">Signing in with Roblox…</h1>
      <p id="message">Please wait while we complete your login.</p>
    </div>
    <script>
      async function doCallback() {
        const params    = new URLSearchParams(window.location.search);
        const code      = params.get('code');
        const state     = params.get('state');
        const saved     = localStorage.getItem('roblox_oauth_state');
        const titleEl   = document.getElementById('title');
        const msgEl     = document.getElementById('message');
        const spinner   = document.getElementById('spinner');

        function fail(msg) {
          spinner.style.display = 'none';
          titleEl.innerHTML = '<span class="error-msg">Login Failed</span>';
          msgEl.textContent  = msg;
        }

        if (!code || !state || !saved || state !== saved) {
          return fail('Invalid login response from Roblox. Please return to the main page and try again.');
        }
        localStorage.removeItem('roblox_oauth_state');

        try {
          const res = await fetch('/api/roblox-callback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            // Send the client_id used to initiate OAuth so the token exchange always matches
            body: JSON.stringify({ code, redirect_uri: window.location.origin + '/roblox-callback', client_id: '8019894370613982106' }),
          });

          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            return fail(errData.details || errData.error || 'Could not complete Roblox login. Please try again.');
          }

          const data = await res.json();
          if (data.displayName) localStorage.setItem('roblox_user_name', data.displayName);
          if (data.username)    localStorage.setItem('roblox_username',   data.username);
          if (data.userId)      localStorage.setItem('roblox_user_id',    data.userId);
          if (data.picture)     localStorage.setItem('roblox_avatar',     data.picture);

          window.location.href = '/';
        } catch (e) {
          fail('Network error — please try again.');
          console.error(e);
        }
      }
      doCallback();
    </script>
  </body>
</html>
